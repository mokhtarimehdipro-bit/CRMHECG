<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche Partenaire - HECG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-10">
    <main class="max-w-6xl mx-auto p-8">
        <div id="loader" class="text-center py-20 font-black text-[#1A4E8A] animate-pulse">Analyse du partenaire en cours...</div>
        
        <div id="content" class="hidden space-y-8">
            <div class="flex justify-between items-start bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div>
                    <h1 id="entNom" class="text-4xl font-black text-[#1A4E8A]">Entreprise</h1>
                    <p id="entContact" class="text-gray-500 font-medium mt-2 flex items-center gap-2">Contact Principal</p>
                </div>
                <button onclick="window.close()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold hover:bg-gray-200">Fermer la fiche</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
                        <h3 class="font-black text-orange-600 mb-4 flex items-center gap-2"><span>🔔</span> Programmer une alerte</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Date du 1er rappel</label>
                                <input type="date" id="alertDate" class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Répétition</label>
                                <select id="alertFreq" class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                                    <option value="Unique">Une seule fois</option>
                                    <option value="Hebdomadaire">Hebdomadaire</option>
                                    <option value="Mensuelle">Mensuelle</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Destinataire</label>
                                <input type="email" id="alertDest" value="m.mokhtari@hecg.fr" class="w-full border p-2 rounded-lg text-sm bg-gray-50 font-bold text-[#1A4E8A]">
                            </div>
                            <button onclick="saveAlert()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-black text-sm hover:bg-orange-600 transition">Activer l'alerte</button>
                        </div>
                        <div id="alertesList" class="mt-4 space-y-2 border-t pt-4"></div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h3 class="text-xl font-black text-gray-800 mb-6 border-b pb-2">📝 Historique des échanges</h3>
                        <div class="flex space-x-2 mb-6 bg-gray-50 p-2 rounded-xl">
                            <input type="text" id="noteTexte" placeholder="Ex: Eu le DRH au téléphone..." class="flex-1 bg-transparent p-2 outline-none text-sm">
                            <button id="btnAddNote" onclick="addNote()" class="bg-[#1A4E8A] text-white px-6 py-2 rounded-lg font-black text-sm">Ajouter</button>
                        </div>
                        <div id="suiviTimeline" class="space-y-4 max-h-64 overflow-y-auto pr-4 custom-scrollbar"></div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-6 border-b pb-2">
                            <h3 class="text-xl font-black text-gray-800">💼 Offres d'alternance</h3>
                            <button onclick="ajouterOffreRapide()" class="text-sm bg-green-50 text-green-600 font-bold px-4 py-2 rounded-lg">+ Nouvelle Offre</button>
                        </div>
                        <div id="listOffres" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfwxfVa2968AgKLdwwV8VIazVACVPVypKXrEUTc-zTuQ08gda8m5_qPfC2BgMyJMwb/exec";
        const partId = new URLSearchParams(window.location.search).get('id');
        let nomEntrepriseActuelle = "";

        // --- FONCTION D'ENVOI SÉCURISÉE ---
        async function apiPost(payload) {
            const userSession = JSON.parse(localStorage.getItem('user') || '{}');
            payload.idAuteur = userSession.nom || "Utilisateur Inconnu";
            payload.auteur = userSession.nom || "Utilisateur Inconnu";
            payload.roleAuteur = userSession.role || "N/A";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (e) {
                console.error("Erreur API :", e);
                return { success: false, message: "Erreur de connexion" };
            }
        }

        // --- CHARGEMENT DES DONNÉES ---
        async function loadDetails() {
            if(!partId) return alert("ID Partenaire manquant");
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getPartnerDetails', targetId: partId }) });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    const d = data.data;
                    
                    nomEntrepriseActuelle = d.info.entreprise;
                    document.getElementById('entNom').innerText = d.info.entreprise;
                    document.getElementById('entContact').innerHTML = `👤 ${d.info.contact || 'Non renseigné'} &nbsp;|&nbsp; ✉️ ${d.info.mail} &nbsp;|&nbsp; 📞 ${d.info.tel || '-'}`;
                    
                    document.getElementById('listOffres').innerHTML = d.offres.map(o => `<div class="p-4 border rounded-2xl bg-gray-50"><p class="font-black text-sm mb-1">${o.poste}</p><span class="text-[10px] uppercase font-bold text-blue-600">${o.etat}</span></div>`).join('') || '<p class="text-gray-400 italic">Aucune offre.</p>';
                    document.getElementById('suiviTimeline').innerHTML = d.suivi.map(s => `<div class="bg-gray-50 p-4 rounded-xl border-l-4 border-[#1A4E8A]"><p class="text-[10px] text-gray-400 font-bold uppercase">${new Date(s.date).toLocaleDateString()} — Par ${s.auteur}</p><p class="text-sm">${s.texte}</p></div>`).join('') || '<p class="text-gray-400 italic">Aucun échange.</p>';
                }
            } catch(e) { console.error(e); }
        }

        // --- AJOUT D'UNE NOTE (CIBLE TES 4 COLONNES) ---
        async function addNote() {
            const txt = document.getElementById('noteTexte').value;
            if(!txt.trim()) return;
            
            const btn = document.getElementById('btnAddNote');
            btn.disabled = true; btn.innerText = "⏳";

            // On envoie les données pour remplir : ID_Partenaire | Auteur | Date | Compte_rendu
            const res = await apiPost({ 
                action: 'addPartnerNote', 
                targetId: partId, 
                texte: txt // Sera utilisé pour "Compte_rendu"
            });

            if(res.success) {
                document.getElementById('noteTexte').value = "";
                await loadDetails();
            }
            btn.disabled = false; btn.innerText = "Ajouter";
        }

        async function saveAlert() { /* Logique Alerte */ }
        async function ajouterOffreRapide() { /* Logique Offre */ }

        // Lancement au démarrage
        loadDetails();
    </script>
</body>
</html>
