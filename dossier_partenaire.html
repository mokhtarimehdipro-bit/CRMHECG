<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche Partenaire - HECG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-10">
    <main class="max-w-6xl mx-auto p-8">
        <div id="loader" class="text-center py-20 font-black text-[#1A4E8A] animate-pulse">Analyse du partenaire en cours...</div>
        
        <div id="content" class="hidden space-y-8">
            <div class="flex justify-between items-start bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div>
                    <h1 id="entNom" class="text-4xl font-black text-[#1A4E8A]">Entreprise</h1>
                    <p id="entContact" class="text-gray-500 font-medium mt-2 flex items-center gap-2">Contact Principal</p>
                </div>
                <button onclick="window.close()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold hover:bg-gray-200">Fermer la fiche</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
                        <h3 class="font-black text-orange-600 mb-4 flex items-center gap-2"><span>🔔</span> Programmer une alerte</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Date du 1er rappel</label>
                                <input type="date" id="alertDate" class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Répétition (Infini)</label>
                                <select id="alertFreq" class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                                    <option value="Unique">Une seule fois</option>
                                    <option value="Hebdomadaire">Hebdomadaire</option>
                                    <option value="Mensuelle">Mensuelle</option>
                                    <option value="Trimestrielle">Trimestrielle</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Email du destinataire</label>
                                <input type="email" id="alertDest" value="m.mokhtari@hecg.fr" class="w-full border p-2 rounded-lg text-sm bg-gray-50 font-bold text-[#1A4E8A]">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400">Message envoyé par mail</label>
                                <textarea id="alertMsg" placeholder="Rappeler le DRH..." class="w-full border p-2 rounded-lg text-xs bg-gray-50 custom-scrollbar"></textarea>
                            </div>
                            <button onclick="saveAlert()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-black text-sm hover:bg-orange-600 transition shadow-md">Activer l'alerte</button>
                        </div>
                        <div id="alertesList" class="mt-4 space-y-2 border-t pt-4"></div>
                    </div>

                    <div class="bg-gradient-to-br from-[#1A4E8A] to-[#002a5c] p-6 rounded-3xl shadow-lg text-white">
                        <h3 class="font-black text-blue-100 mb-4 uppercase tracking-wider text-sm">🎓 Alternants en poste</h3>
                        <div id="listEtu" class="text-sm space-y-3"></div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h3 class="text-xl font-black text-gray-800 mb-6 border-b pb-2">📝 Historique des échanges</h3>
                        <div class="flex space-x-2 mb-6 bg-gray-50 p-2 rounded-xl">
                            <input type="text" id="noteTexte" placeholder="Ex: Eu le DRH au téléphone..." class="flex-1 bg-transparent p-2 outline-none text-sm">
                            <button onclick="addNote()" class="bg-[#1A4E8A] text-white px-6 py-2 rounded-lg font-black text-sm">Ajouter</button>
                        </div>
                        <div id="suiviTimeline" class="space-y-4 max-h-64 overflow-y-auto pr-4 custom-scrollbar"></div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-6 border-b pb-2">
                            <h3 class="text-xl font-black text-gray-800">💼 Offres d'alternance</h3>
                            <button onclick="ajouterOffreRapide()" class="text-sm bg-green-50 text-green-600 font-bold px-4 py-2 rounded-lg hover:bg-green-100 transition">+ Nouvelle Offre</button>
                        </div>
                        <div id="listOffres" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfwxfVa2968AgKLdwwV8VIazVACVPVypKXrEUTc-zTuQ08gda8m5_qPfC2BgMyJMwb/exec";
        async function apiPost(payload) {
    const userSession = JSON.parse(localStorage.getItem('user') || '{}');
    payload.idAuteur = userSession.nom || "Inconnu";
    payload.roleAuteur = userSession.role || "N/A";
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        return await response.json();
    } catch (e) {
        console.error("Erreur API :", e);
        return { success: false, message: "Erreur de connexion" };
    }
}
        const partId = new URLSearchParams(window.location.search).get('id');
        
        let currentUser = null;
        let nomEntrepriseActuelle = "";

        try { currentUser = JSON.parse(localStorage.getItem('user')); } catch(e) {}
        if(!currentUser) currentUser = { nom: "Utilisateur" };

        async function loadDetails() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getPartnerDetails', targetId: partId }) });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    const d = data.data;
                    
                    nomEntrepriseActuelle = d.info.entreprise;
                    document.getElementById('entNom').innerText = d.info.entreprise;
                    document.getElementById('entContact').innerHTML = `👤 ${d.info.contact || 'Non renseigné'} &nbsp;|&nbsp; ✉️ <a href="mailto:${d.info.mail}" class="text-blue-500 hover:underline">${d.info.mail}</a> &nbsp;|&nbsp; 📞 ${d.info.tel || '-'}`;
                    
                    document.getElementById('listEtu').innerHTML = d.alternants.map(e => `<div class="bg-white/10 p-3 rounded-xl border border-white/20"><p class="font-bold text-lg leading-tight">${e.nom}</p><p class="text-[10px] text-blue-200 uppercase mt-1 font-black tracking-widest">${e.classe}</p></div>`).join('') || '<p class="text-blue-200 italic text-center py-4">Aucun alternant HECG actuellement.</p>';
                    document.getElementById('listOffres').innerHTML = d.offres.map(o => `<div class="p-4 border border-gray-100 rounded-2xl bg-gray-50 hover:shadow-md transition"><div class="flex justify-between items-start mb-2"><span class="px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-black rounded uppercase">${o.etat}</span></div><p class="font-black text-gray-800 text-sm mb-3">${o.poste}</p><a href="${o.url}" target="_blank" class="text-[#F26522] text-xs font-bold hover:underline inline-flex items-center gap-1">Voir l'annonce ↗</a></div>`).join('') || '<p class="col-span-2 text-gray-400 italic text-center py-6">Aucune offre associée.</p>';
                    document.getElementById('suiviTimeline').innerHTML = d.suivi.map(s => `<div class="bg-gray-50 p-4 rounded-xl border-l-4 border-[#1A4E8A]"><p class="text-[10px] text-gray-400 font-bold uppercase mb-1">${new Date(s.date).toLocaleDateString('fr-FR')} — Par ${s.auteur}</p><p class="text-sm text-gray-700">${s.texte}</p></div>`).join('') || '<p class="text-gray-400 italic text-center">Aucun échange enregistré.</p>';
                    document.getElementById('alertesList').innerHTML = d.alertes.filter(a => a.statut === 'Actif' || a.statut === 'À faire').map(a => `<div class="bg-orange-50 p-2 rounded text-[10px] border border-orange-200"><b class="text-orange-800">Prévue le ${new Date(a.date).toLocaleDateString()} (${a.freq})</b><br><span class="text-orange-600 truncate block">${a.msg}</span></div>`).join('');
                }
            } catch(e) {
                alert("Erreur de chargement. Vérifiez que l'entreprise existe bien.");
            }
        }

        async function addNote() {
            const txt = document.getElementById('noteTexte').value;
            if(!txt.trim()) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addPartnerNote', targetId: partId, auteur: currentUser.nom, texte: txt }) });
            document.getElementById('noteTexte').value = ""; loadDetails();
        }

        // LA FONCTION CORRIGÉE QUI ENVOIE L'ID ET L'EMAIL AU SERVEUR
        async function saveAlert() {
            const date = document.getElementById('alertDate').value;
            const msg = document.getElementById('alertMsg').value;
            const destinataire = document.getElementById('alertDest').value; // Capture de l'email
            
            if(!date || !msg) return alert("Veuillez remplir la date et le message.");
            
            const btn = event.target; 
            btn.innerText = "Enregistrement..."; btn.disabled = true;

            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'setPartnerAlert', 
                    targetId: partId, // ID exact de l'entreprise
                    date: date, 
                    freq: document.getElementById('alertFreq').value, 
                    msg: msg,
                    destinataire: destinataire // Envoi de l'email au serveur
                }) 
            });
            
            alert("Alerte programmée avec succès !"); 
            document.getElementById('alertDate').value = ""; 
            document.getElementById('alertMsg').value = ""; 
            btn.innerText = "Activer l'alerte"; btn.disabled = false;
            loadDetails();
        }

        async function ajouterOffreRapide() {
            const url = prompt("Étape 1/2 : Collez le lien de l'offre (URL) :");
            if(!url) return;
            const poste = prompt("Étape 2/2 : Quel est le titre du poste ?");
            if(!poste) return;
            const btn = event.target; btn.innerText = "Création..."; btn.disabled = true;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addOffre', url: url, entreprise: nomEntrepriseActuelle, poste: poste, plateforme: "Direct Partenaire", type: "Alternance", missions: "À définir", etat: "Reçue", qualite: "Vérifiée" }) });
            btn.innerText = "+ Nouvelle Offre"; btn.disabled = false; loadDetails();
        }
        loadDetails();
    </script>
    <style>.custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }</style>
</body>
</html>
