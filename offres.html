<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HECG - Bourse aux Offres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <img src="https://hecg.fr/wp-content/uploads/2025/03/LOGO-FORMAT-PNG-1-1.png" alt="Logo" class="h-10 cursor-pointer" onclick="window.location.href='dashboard.html'">
            <div class="flex space-x-4 border-l-2 pl-4 border-gray-200 overflow-x-auto text-sm">
                <a href="dashboard.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Étudiants</a>
                <a href="partenaires.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Entreprises</a>
                <a href="alertes.html" class="font-bold text-orange-500 hover:text-orange-600">Alertes 🔔</a>
                <a href="offres.html" class="font-bold text-[#1A4E8A] border-b-2 border-[#1A4E8A] pb-1">Offres</a>
                <a href="statistiques.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Stats</a>
                <a href="campagnes.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Campagnes</a>
                <a href="communication.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Com & Événements</a>
            </div>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 font-bold border border-red-500 px-3 py-1 rounded-lg hover:bg-red-50 transition">Déconnexion</button>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-[#1A4E8A]">Bourse aux Offres</h1>
            <button onclick="openModal()" class="bg-[#F26522] text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition">+ Ajouter une offre</button>
        </div>

        <div id="loader" class="text-center py-20 font-black text-[#1A4E8A] animate-pulse">Chargement des annonces...</div>
        
        <div id="offresGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </main>

    <div id="offreModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scrollbar shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black text-[#1A4E8A] mb-6">Fiche de l'Offre</h2>
            <input type="hidden" id="formOffreId">
            
            <div class="space-y-4">
                <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                    <label class="block text-[10px] font-black text-[#1A4E8A] mb-1 uppercase tracking-widest">Titre du poste *</label>
                    <input type="text" id="offrePoste" placeholder="Ex: Assistant(e) Marketing Digital" class="w-full border-none bg-transparent text-lg font-black outline-none focus:ring-0" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Entreprise *</label>
                        <input type="text" id="offreEnt" class="w-full border p-3 rounded-xl font-bold" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Plateforme / Source</label>
                        <input type="text" id="offrePlateforme" placeholder="Indeed, LinkedIn..." class="w-full border p-3 rounded-xl">
                    </div>
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Lien de l'annonce (URL) *</label>
                    <input type="url" id="offreUrl" class="w-full border p-3 rounded-xl text-blue-500 font-medium" required>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Contrat</label>
                        <select id="offreType" class="w-full border p-3 rounded-xl font-bold text-sm">
                            <option value="Alternance">Alternance</option>
                            <option value="Stage">Stage</option>
                            <option value="CDI">CDI</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">État</label>
                        <select id="offreEtat" class="w-full border p-3 rounded-xl font-bold text-sm">
                            <option value="Reçue">Reçue</option>
                            <option value="En cours">En cours</option>
                            <option value="Pourvue">Pourvue</option>
                            <option value="Annulée">Annulée</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Qualité</label>
                        <select id="offreQualite" class="w-full border p-3 rounded-xl font-bold text-sm">
                            <option value="Vérifiée">✅ Vérifiée</option>
                            <option value="À Qualifier">❓ À Qualifier</option>
                            <option value="Obsolète">❌ Obsolète</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-orange-500 mb-1 uppercase">📝 (notes interne) - Suivi équipe</label>
                    <textarea id="offreMissions" rows="3" class="w-full border p-3 rounded-xl text-sm" placeholder="Détails..."></textarea>
                </div>
            </div>

            <div class="mt-8 flex justify-end space-x-3 border-t pt-6">
                <button onclick="closeModal()" class="px-6 py-3 text-gray-400 font-bold hover:text-gray-600">Annuler</button>
                <button onclick="saveOffre()" id="btnSaveOffre" class="px-8 py-3 bg-[#1A4E8A] text-white font-black rounded-xl shadow-lg hover:bg-blue-800 transition">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="shareModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl p-8 w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-black text-[#1A4E8A] mb-2">📡 Partager l'offre</h2>
            <p id="shareOffreTitle" class="text-slate-400 text-sm mb-6 font-bold truncate"></p>
            <input type="hidden" id="shareOffreId">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-widest">Sélectionner le destinataire</label>
                    <select id="selectEtudiant" class="w-full border-2 p-3 rounded-xl bg-gray-50 font-bold outline-none focus:border-[#F26522] transition-colors">
                        <option value="">Chargement de la liste...</option>
                    </select>
                </div>
                <button onclick="confirmShare()" id="btnConfirmShare" class="w-full py-4 bg-[#F26522] text-white rounded-2xl font-black shadow-lg hover:scale-[1.02] active:scale-95 transition-all">CONFIRMER LE PARTAGE</button>
                <button onclick="closeShareModal()" class="w-full text-slate-400 font-bold text-sm hover:text-slate-600 transition">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfwxfVa2968AgKLdwwV8VIazVACVPVypKXrEUTc-zTuQ08gda8m5_qPfC2BgMyJMwb/exec";
        let currentOffres = [];
        let listEtu = [];

        // 1. CHARGER LES OFFRES
        async function loadOffres() {
            const grid = document.getElementById('offresGrid');
            const loader = document.getElementById('loader');

            try {
                loader.classList.remove('hidden');
                grid.classList.add('hidden');

                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getOffres' }) });
                const data = await res.json();

                loader.classList.add('hidden');
                grid.classList.remove('hidden');

                if (data.success && data.data && data.data.length > 0) {
                    currentOffres = data.data;
                    grid.innerHTML = currentOffres.map(o => {
                        // --- 1. LOGOS PLATEFORMES (Serveurs Google Favicon = Infaillibles) ---
                        let nomPlateforme = o.Plateforme || o.plateforme || "Inconnu";
                        let pf = nomPlateforme.toLowerCase();
                        let logoHTML = `<span class="px-2 py-1 text-[10px] font-bold text-gray-600 bg-gray-100 rounded shadow-sm">${nomPlateforme}</span>`; 
                        
                        if (pf.includes("linkedin")) logoHTML = `<img src="https://www.google.com/s2/favicons?domain=linkedin.com&sz=128" class="h-6 w-6 object-contain rounded-md shadow-sm" title="LinkedIn">`;
                        else if (pf.includes("indeed")) logoHTML = `<img src="https://www.google.com/s2/favicons?domain=indeed.com&sz=128" class="h-6 w-6 object-contain rounded-md shadow-sm" title="Indeed">`;
                        else if (pf.includes("france travail") || pf.includes("francetravail")) logoHTML = `<img src="https://www.google.com/s2/favicons?domain=francetravail.fr&sz=128" class="h-6 w-6 object-contain rounded-md shadow-sm" title="France Travail">`;
                        else if (pf.includes("monster")) logoHTML = `<img src="https://www.google.com/s2/favicons?domain=monster.fr&sz=128" class="h-6 w-6 object-contain rounded-md shadow-sm" title="Monster">`;
                        else if (pf.includes("hellowork")) logoHTML = `<img src="https://www.google.com/s2/favicons?domain=hellowork.com&sz=128" class="h-6 w-6 object-contain rounded-md shadow-sm" title="HelloWork">`;

                        // --- 2. QUALITÉ / COULEURS (Lecture de la Colonne J via o.qualite) ---
                        let brutQualite = o.qualite || "À QUALIFIER";
                        let qualiteTexte = brutQualite.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                        
                        let bgCarte = "bg-white border-gray-100"; 
                        let badgeQualite = "bg-gray-100 text-gray-600 border-gray-200";

                        if (qualiteTexte.includes("qualifier")) {
                            bgCarte = "bg-yellow-50 border-yellow-400";
                            badgeQualite = "bg-yellow-100 text-yellow-800 border-yellow-300";
                        } else if (qualiteTexte.includes("obsolete") || qualiteTexte.includes("annule")) {
                            bgCarte = "bg-red-50 border-red-300 opacity-80";
                            badgeQualite = "bg-red-100 text-red-800 border-red-200";
                        } else if (qualiteTexte.includes("valide")) {
                            bgCarte = "bg-green-50 border-green-400";
                            badgeQualite = "bg-green-100 text-green-800 border-green-300";
                        }

                        // --- 3. ÉTAT / PARTAGE (Lecture de la Colonne N via o.etat) ---
                        let brutEtat = o.etat || "Non partagée";
                        let etatTexte = brutEtat.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                        
                        let estPartage = etatTexte.includes("partagee") || etatTexte.includes("partage");
                        if (etatTexte.includes("non")) estPartage = false; 
                        
                        let badgePartage = estPartage ? "bg-blue-100 text-blue-800 border-blue-300" : "bg-slate-100 text-slate-500 border-slate-200";

                        const safePoste = (o.poste || "").replace(/'/g, "\\'");

                        const namesHTML = estPartage && o.destinataires && o.destinataires.length > 0 
                            ? `<details class="mt-3 group">
                                 <summary class="text-[9px] font-black text-blue-500 cursor-pointer uppercase list-none focus:outline-none hover:underline">
                                    👥 Voir les ${o.destinataires.length} partages
                                 </summary>
                                 <div class="flex flex-wrap gap-1 mt-2 p-2 bg-white/50 rounded-xl border border-blue-100">
                                    ${o.destinataires.map(name => `<span class="px-2 py-0.5 bg-white text-[#1A4E8A] rounded text-[9px] font-bold border border-blue-100 shadow-sm">${name}</span>`).join('')}
                                 </div>
                               </details>`
                            : `<p class="text-[9px] text-slate-400 italic mt-3 font-bold uppercase tracking-tighter">Aucun partage effectué</p>`;

                        // --- 4. AFFICHAGE DE LA CARTE ---
                        return `
                        <div class="${bgCarte} rounded-[2rem] shadow-sm border p-6 flex flex-col justify-between hover:shadow-xl transition-all duration-300 group">
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex gap-2">
                                        <span class="px-2 py-1 text-[10px] font-black uppercase rounded border shadow-sm ${badgeQualite}">${brutQualite}</span>
                                        <span class="px-2 py-1 text-[10px] font-black uppercase rounded border shadow-sm ${badgePartage}">${brutEtat}</span>
                                    </div>
                                    <div class="ml-2">
                                        ${logoHTML}
                                    </div>
                                </div>
                                
                                <h3 class="text-xl font-black text-gray-800 mb-1 leading-tight group-hover:text-[#1A4E8A] transition-colors">${o.poste || 'Sans titre'} <span class="text-[#F26522] text-xs font-bold">(missions internes)</span></h3>
                                <p class="text-[#F26522] font-black text-sm mb-4 uppercase">🏢 ${o.entreprise}</p>
                                
                                <p class="text-[10px] font-bold text-gray-400 tracking-tighter mb-2">📅 Parue le ${new Date(o.date).toLocaleDateString()}</p>
                                <div class="mt-4 p-3 bg-gray-50 rounded-xl border border-gray-100">
    <p class="text-[9px] font-black text-gray-400 uppercase mb-1">📝 (notes interne) :</p>
    <p class="text-[11px] text-gray-600 font-medium italic leading-snug">
        ${o.missions || 'Aucune note de suivi pour le moment.'}
    </p>
</div>
                                
                                ${namesHTML}
                            </div>
                            <div class="flex justify-between items-center mt-8 border-t border-gray-50 pt-4">
                                <a href="${o.url}" target="_blank" class="text-blue-500 font-black text-[10px] hover:underline uppercase tracking-widest">Voir l'annonce ↗</a>
                                <div class="flex space-x-1">
                                    <button onclick="openModal('${o.id}')" class="p-2 bg-gray-50 rounded-xl text-gray-400 hover:text-blue-500 hover:bg-white hover:shadow-sm transition" title="Modifier">✏️</button>
                                    <button onclick="openShareModal('${o.id}', '${safePoste}')" class="p-2 bg-gray-50 rounded-xl text-gray-400 hover:text-blue-600 hover:bg-white hover:shadow-sm transition" title="Partager">📡</button>
                                    <button onclick="deleteOffre('${o.id}')" class="p-2 bg-gray-50 rounded-xl text-gray-400 hover:text-red-500 hover:bg-white hover:shadow-sm transition" title="Supprimer">🗑️</button>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 bg-white rounded-[2rem] border border-dashed border-gray-200"><p class="text-gray-400 italic font-bold">Aucune offre disponible.</p></div>';
                }
            } catch (err) { loader.innerHTML = '<p class="text-red-500 font-bold uppercase text-xs">⚠️ Erreur de communication</p>'; }
        }

        // 2. MODAL AJOUT / MODIF
        function openModal(id = null) { 
            document.getElementById('offreModal').classList.replace('hidden', 'flex'); 
            if(id) {
                const o = currentOffres.find(x => x.id === id);
                document.getElementById('modalTitle').innerText = "Modifier l'Offre";
                document.getElementById('formOffreId').value = o.id;
                document.getElementById('offrePoste').value = o.poste || "";
                document.getElementById('offreEnt').value = o.entreprise;
                document.getElementById('offreUrl').value = o.url;
                document.getElementById('offrePlateforme').value = o.plateforme;
                document.getElementById('offreType').value = o.type;
                document.getElementById('offreMissions').value = o.missions;
                document.getElementById('offreEtat').value = o.etat;
                document.getElementById('offreQualite').value = o.qualite;
            } else {
                document.getElementById('modalTitle').innerText = "Ajouter une Offre";
                document.getElementById('formOffreId').value = "";
                document.getElementById('offrePoste').value = "";
                document.getElementById('offreEnt').value = "";
                document.getElementById('offreUrl').value = "";
                document.getElementById('offrePlateforme').value = "";
                document.getElementById('offreEtat').value = "Reçue";
                document.getElementById('offreQualite').value = "À Qualifier";
            }
        }
        function closeModal() { document.getElementById('offreModal').classList.replace('flex', 'hidden'); }

        async function saveOffre() {
            const btn = document.getElementById('btnSaveOffre');
            const payload = {
                action: document.getElementById('formOffreId').value ? 'updateOffre' : 'addOffre',
                id: document.getElementById('formOffreId').value,
                poste: document.getElementById('offrePoste').value,
                entreprise: document.getElementById('offreEnt').value,
                url: document.getElementById('offreUrl').value,
                plateforme: document.getElementById('offrePlateforme').value,
                type: document.getElementById('offreType').value,
                missions: document.getElementById('offreMissions').value,
                etat: document.getElementById('offreEtat').value,
                qualite: document.getElementById('offreQualite').value
            };
            if(!payload.poste || !payload.entreprise || !payload.url) return alert("Veuillez remplir les champs obligatoires.");
            btn.disabled = true; btn.innerText = "Enregistrement...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            btn.disabled = false; btn.innerText = "Enregistrer";
            closeModal(); loadOffres();
        }

        async function deleteOffre(id) {
            if(!confirm("Êtes-vous sûr de vouloir supprimer cette offre ?")) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteOffre', id: id }) });
            loadOffres();
        }

        // 3. PARTAGE
        async function openShareModal(id, titre) {
            document.getElementById('shareOffreId').value = id;
            document.getElementById('shareOffreTitle').innerText = titre;
            document.getElementById('shareModal').classList.replace('hidden', 'flex');
            
            if (listEtu.length === 0) {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getStudentsMinList' }) });
                const d = await res.json();
                if (d.success) {
                    listEtu = d.data;
                    const select = document.getElementById('selectEtudiant');
                    select.innerHTML = '<option value="">-- Choisir un étudiant --</option>' + 
                        '<option value="GROUP_RECHERCHE" style="font-weight:black; color:#F26522;">🚀 TOUS CEUX EN RECHERCHE</option>' +
                        listEtu.map(e => `<option value="${e.email}">${e.nom} ${e.prenom} (${e.classe})</option>`).join('');
                }
            }
        }
        function closeShareModal() { document.getElementById('shareModal').classList.replace('flex', 'hidden'); }

        async function confirmShare() {
    const idOffre = document.getElementById('shareOffreId').value;
    const emailEtu = document.getElementById('selectEtudiant').value;
    if (!emailEtu) return alert("Veuillez choisir un destinataire.");

    const btn = document.getElementById('btnConfirmShare');
    btn.disabled = true; 
    btn.innerText = "Traitement en cours...";

    try {
        const res = await fetch(API_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'partagerOffre', id_etu: emailEtu, id_offre: idOffre }) 
        });
        
        // On vérifie si la réponse est bien du JSON
        const d = await res.json();
        alert(d.message);
        
        if (d.success) { 
            closeShareModal(); 
            loadOffres(); 
        }
    } catch (err) {
        console.error(err);
        alert("Le partage a été lancé, mais le serveur met du temps à répondre. Vérifiez le dossier de l'étudiant dans quelques instants.");
        closeShareModal();
    } finally {
        // QUOI QU'IL ARRIVE, on réactive le bouton
        btn.disabled = false; 
        btn.innerText = "CONFIRMER LE PARTAGE";
    }
}

        // INITIALISATION
        loadOffres();
    </script>
</body>
</html>
