<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique - HECG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <img src="https://hecg.fr/wp-content/uploads/2025/03/LOGO-FORMAT-PNG-1-1.png" alt="Logo" class="h-10 cursor-pointer" onclick="window.location.href='dashboard.html'">
            <div class="flex space-x-4 border-l-2 pl-4 border-gray-200 overflow-x-auto text-sm">
                <a href="dashboard.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Étudiants</a>
                <a href="partenaires.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Entreprises</a>
                <a href="alertes.html" class="font-bold text-orange-500 hover:text-orange-600">Alertes 🔔</a>
                <a href="offres.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Offres</a>
                <a href="statistiques.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Stats</a>
                <a href="campagnes.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Campagnes</a>
                <a href="communication.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Com & Événements</a>
                <a href="historique.html" class="font-bold text-[#1A4E8A] border-b-2 border-[#1A4E8A] pb-1">Historique</a>
            </div>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 font-bold border border-red-500 px-3 py-1 rounded-lg hover:bg-red-50">Déconnexion</button>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-[#1A4E8A]">Journal d'Audit</h1>
            <div class="flex space-x-2">
                <input type="text" id="searchLog" placeholder="Rechercher..." class="px-4 py-2 border rounded-lg text-sm w-64 outline-none focus:border-[#1A4E8A]" oninput="filterLogs()">
                <button onclick="loadHistory()" class="bg-[#1A4E8A] text-white px-4 py-2 rounded-lg text-sm hover:bg-opacity-90">🔄</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <th class="p-4">Date</th>
                        <th class="p-4">Auteur</th>
                        <th class="p-4">Action</th>
                        <th class="p-4">Catégorie / Cible</th>
                        <th class="p-4">Détails</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="text-sm">
                    <tr><td colspan="5" class="p-10 text-center font-bold text-[#1A4E8A] animate-pulse">Chargement de l'historique...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

   <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfwxfVa2968AgKLdwwV8VIazVACVPVypKXrEUTc-zTuQ08gda8m5_qPfC2BgMyJMwb/exec";
        let allLogs = [];

        // 1. On récupère l'utilisateur connecté
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // 2. Sécurité : Si pas Administrateur, on dégage
        if (user.role !== 'Administrateur') {
            alert("Accès réservé aux administrateurs. Veuillez vous reconnecter.");
            window.location.href = 'index.html';
        }

        // 3. Le "Postier" qui signe vos messages avec votre Nom et Rôle
        async function apiPost(payload) {
            payload.idAuteur = user.nom || "Inconnu";
            payload.roleAuteur = user.role || "N/A";
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                return await res.json();
            } catch (e) { 
                console.error("Erreur Connexion:", e);
                return { success: false }; 
            }
        }

        // 4. Chargement des logs via le Postier
        async function loadLogs() {
            const loader = document.getElementById('loader');
            // On utilise apiPost au lieu de fetch direct !
            const res = await apiPost({ action: 'getHistory' });
            
            if (res.success) {
                allLogs = res.logs;
                if (loader) loader.classList.add('hidden');
                renderLogs(allLogs);
            } else {
                alert("Le serveur a refusé l'accès ou est indisponible.");
            }
        }

        function renderLogs(logs) {
            const body = document.getElementById('logTableBody');
            body.innerHTML = logs.map(log => {
                const dateStr = log.Date ? new Date(log.Date).toLocaleString('fr-FR') : '-';
                let badge = "bg-gray-100 text-gray-700";
                if (log.Type === "Création") badge = "bg-green-100 text-green-700 border border-green-200";
                if (log.Type === "Suppression") badge = "bg-red-100 text-red-700 border border-red-200";
                
                // On gère les noms de colonnes avec ou sans accents pour plus de sécurité
                const auteur = log.Auteur || log.auteur || "Inconnu";
                const role = log.Rôle || log.Role || log.role || "N/A";
                const categorie = log.Catégorie || log.Categorie || log.categorie || "Général";
                const details = log.Détails || log.Details || log.details || "";

                return `
                <tr class="border-b border-gray-50 hover:bg-gray-50">
                    <td class="p-4 text-xs font-bold text-gray-500">${dateStr}</td>
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${auteur}</div>
                        <div class="text-[10px] text-gray-400 uppercase">${role}</div>
                    </td>
                    <td class="p-4"><span class="px-2 py-1 rounded-xl text-[10px] font-black uppercase shadow-sm ${badge}">${log.Type}</span></td>
                    <td class="p-4">
                        <div class="font-bold text-[#1A4E8A] text-xs">${categorie}</div>
                        <div class="font-mono text-[10px] text-gray-500 mt-1">${log.Cible || "-"}</div>
                    </td>
                    <td class="p-4 text-xs text-gray-600">${details}</td>
                </tr>`;
            }).join('');
        }

        function filterLogs() {
            const term = document.getElementById('searchLog').value.toLowerCase();
            const filtered = allLogs.filter(l => 
                (l.Auteur || "").toLowerCase().includes(term) || 
                (l.Détails || l.details || "").toLowerCase().includes(term)
            );
            renderLogs(filtered);
        }

        loadLogs();
    </script>
</body>
</html>
