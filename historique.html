<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique & Audit - HECG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <img src="https://hecg.fr/wp-content/uploads/2025/03/LOGO-FORMAT-PNG-1-1.png" alt="Logo" class="h-10 cursor-pointer" onclick="window.location.href='dashboard.html'">
            <div class="flex space-x-4 border-l-2 pl-4 border-gray-200 overflow-x-auto text-sm">
                <a href="dashboard.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Étudiants</a>
                <a href="partenaires.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Entreprises</a>
                <a href="alertes.html" class="font-bold text-orange-500 hover:text-orange-600">Alertes 🔔</a>
                <a href="offres.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Offres</a>
                <a href="statistiques.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Stats</a>
                <a href="campagnes.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Campagnes</a>
                <a href="communication.html" class="font-semibold text-gray-500 hover:text-[#1A4E8A]">Com & Événements</a>
                <a href="historique.html" class="font-bold text-[#1A4E8A] border-b-2 border-[#1A4E8A] pb-1">Historique</a>
            </div>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 font-bold border border-red-500 px-3 py-1 rounded-lg hover:bg-red-50">Déconnexion</button>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-[#1A4E8A]">Journal d'Audit</h1>
                <p class="text-sm text-gray-400 font-bold mt-1">Traçabilité complète des actions</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="loadHistory()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold hover:bg-gray-200 transition">🔄 Rafraîchir</button>
                <button onclick="exportCSV()" class="bg-green-600 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:bg-green-700 transition">📥 Exporter CSV</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Actions filtrées</p>
                <p class="text-3xl font-black text-[#1A4E8A] mt-1" id="kpi-total">0</p>
            </div>
            <div class="bg-green-50 p-5 rounded-2xl shadow-sm border border-green-100">
                <p class="text-[10px] font-black text-green-600 uppercase tracking-widest">Créations</p>
                <p class="text-3xl font-black text-green-700 mt-1" id="kpi-crea">0</p>
            </div>
            <div class="bg-blue-50 p-5 rounded-2xl shadow-sm border border-blue-100">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Modifications</p>
                <p class="text-3xl font-black text-blue-700 mt-1" id="kpi-modif">0</p>
            </div>
            <div class="bg-red-50 p-5 rounded-2xl shadow-sm border border-red-100">
                <p class="text-[10px] font-black text-red-600 uppercase tracking-widest">Suppressions</p>
                <p class="text-3xl font-black text-red-700 mt-1" id="kpi-supp">0</p>
            </div>
        </div>
<div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Recherche (Détails ou Cible)</label>
                    <input type="text" id="fSearch" placeholder="Ex: Entretien, Changement mail..." class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-gray-50 outline-none focus:border-[#1A4E8A]" oninput="applyFilters()">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Auteur</label>
                    <select id="fAuteur" class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-white outline-none focus:border-[#1A4E8A]" onchange="applyFilters()">
                        <option value="">Tous les auteurs</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Catégorie</label>
                    <select id="fCategorie" class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-white outline-none focus:border-[#1A4E8A]" onchange="applyFilters()">
                        <option value="">Toutes les catégories</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Cible</label>
                    <select id="fCible" class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-white outline-none focus:border-[#1A4E8A]" onchange="applyFilters()">
                        <option value="">Toutes les cibles</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Action</label>
                    <select id="fAction" class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-white outline-none focus:border-[#1A4E8A]" onchange="applyFilters()">
                        <option value="">Toutes</option>
                        <option value="Création">Création</option>
                        <option value="Modification">Modification</option>
                        <option value="Suppression">Suppression</option>
                        <option value="Action">Autre</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-gray-50">
                <div class="w-48">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Filtrer par Date</label>
                    <input type="date" id="fDate" class="w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-sm font-bold bg-white outline-none focus:border-[#1A4E8A]" onchange="applyFilters()">
                </div>
                <button onclick="resetFilters()" class="px-6 py-2 bg-gray-100 text-gray-500 rounded-xl text-[10px] font-black uppercase hover:bg-gray-200 transition">Réinitialiser les filtres</button>
            </div>
        </div>
        
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                        <th class="p-5 w-40">Date</th>
                        <th class="p-5 w-48">Utilisateur</th>
                        <th class="p-5 w-32">Action</th>
                        <th class="p-5 w-48">Cible</th>
                        <th class="p-5">Détails de l'opération</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="text-sm">
                    <tr><td colspan="5" class="p-10 text-center font-bold text-[#1A4E8A] animate-pulse">Chargement de l'historique...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfwxfVa2968AgKLdwwV8VIazVACVPVypKXrEUTc-zTuQ08gda8m5_qPfC2BgMyJMwb/exec";
        let allLogs = [];
        let filteredLogs = [];

        // IDENTITÉ & SÉCURITÉ
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        window.onload = () => {
            if (user.role !== "Administrateur") {
                alert("Accès Administrateur requis.");
                window.location.href = 'dashboard.html';
            } else { loadHistory(); }
        };

        // FONCTION ANTI-ID ET ANTI-ERREUR
        function getSafeValue(obj, motsCles) {
            for (let mot of motsCles) {
                const trueKey = Object.keys(obj).find(k => 
                    k.toLowerCase().includes(mot.toLowerCase()) && 
                    !k.toLowerCase().includes('id') // Exclut les colonnes ID
                );
                if (trueKey) return obj[trueKey];
            }
            return "";
        }

        async function loadHistory() {
            document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="5" class="p-10 text-center font-bold text-[#1A4E8A] animate-pulse">Lecture du Sheet...</td></tr>';
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'getHistory', roleAuteur: user.role })
                });
                const result = await response.json();
                if (result.success) {
                    allLogs = result.logs;
                    populateFilters();
                    applyFilters(); 
                }
            } catch (e) { console.error(e); }
        }

        function populateFilters() {
            // Auteurs
            const auteurs = [...new Set(allLogs.map(l => getSafeValue(l, ['auteur', 'nom']) || "Inconnu"))].sort();
            document.getElementById('fAuteur').innerHTML = '<option value="">Tous les auteurs</option>' + auteurs.map(a => `<option value="${a}">${a}</option>`).join('');
            
            // Catégories (NOUVEAU)
            const categories = [...new Set(allLogs.map(l => getSafeValue(l, ['catégorie', 'categorie']) || "Général"))].filter(c => c !== "").sort();
            document.getElementById('fCategorie').innerHTML = '<option value="">Toutes les catégories</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');

            // Cibles (Entreprises, ETU, etc)
            const cibles = [...new Set(allLogs.map(l => getSafeValue(l, ['cible']) || "Sans cible"))].filter(c => c !== "").sort();
            document.getElementById('fCible').innerHTML = '<option value="">Toutes les cibles</option>' + cibles.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function applyFilters() {
            const fSearch = document.getElementById('fSearch').value.toLowerCase();
            const fAuteur = document.getElementById('fAuteur').value.toLowerCase();
            const fCategorie = document.getElementById('fCategorie').value.toLowerCase(); // NOUVEAU
            const fCible = document.getElementById('fCible').value.toLowerCase();
            const fAction = document.getElementById('fAction').value.toLowerCase();
            const fDate = document.getElementById('fDate').value; 

            filteredLogs = allLogs.filter(log => {
                const auteur = String(getSafeValue(log, ['auteur']) || "").toLowerCase();
                const type = String(getSafeValue(log, ['type', 'action']) || "").toLowerCase();
                const categorie = String(getSafeValue(log, ['catégorie', 'categorie']) || "").toLowerCase(); // NOUVEAU
                const cible = String(getSafeValue(log, ['cible']) || "").toLowerCase();
                const details = String(getSafeValue(log, ['détail', 'detail']) || "").toLowerCase();
                const dateVal = getSafeValue(log, ['date']);

                const matchSearch = fSearch === "" || details.includes(fSearch) || cible.includes(fSearch);
                const matchAuteur = fAuteur === "" || auteur === fAuteur;
                const matchCategorie = fCategorie === "" || categorie === fCategorie; // NOUVEAU
                const matchCible = fCible === "" || cible === fCible;
                const matchAction = fAction === "" || type.includes(fAction);
                
                let matchDate = true;
                if (fDate && dateVal) {
                    const logDateISO = new Date(dateVal).toISOString().split('T')[0];
                    matchDate = (logDateISO === fDate);
                }

                return matchSearch && matchAuteur && matchCategorie && matchCible && matchAction && matchDate;
            });

        function updateKPIs(logs) {
            document.getElementById('kpi-total').innerText = logs.length;
            let crea = 0, modif = 0, supp = 0;
            logs.forEach(log => {
                const type = String(getSafeValue(log, ['type', 'action']) || "").toLowerCase();
                if (type.includes("créat")) crea++;
                if (type.includes("modif")) modif++;
                if (type.includes("suppr")) supp++;
            });
            document.getElementById('kpi-crea').innerText = crea;
            document.getElementById('kpi-modif').innerText = modif;
            document.getElementById('kpi-supp').innerText = supp;
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('historyTableBody');
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400 italic">Aucun log trouvé pour ces filtres.</td></tr>';
                return;
            }
            
            tbody.innerHTML = logs.map(log => {
                const dateVal = getSafeValue(log, ['date']);
                const dateStr = dateVal ? new Date(dateVal).toLocaleString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
                const typeAction = getSafeValue(log, ['type', 'action']) || "Info";
                const auteur = getSafeValue(log, ['auteur']) || "Inconnu";
                const role = getSafeValue(log, ['rôle', 'role']) || "N/A";
                const categorie = getSafeValue(log, ['catégorie', 'categorie']) || "Général";
                const cible = getSafeValue(log, ['cible']) || "-";
                const details = getSafeValue(log, ['détail', 'detail']) || "";

                let badge = "bg-gray-100 text-gray-600";
                if (typeAction.includes("Créat")) badge = "bg-green-100 text-green-700 border border-green-200";
                if (typeAction.includes("Modif")) badge = "bg-blue-100 text-blue-700 border border-blue-200";
                if (typeAction.includes("Suppr")) badge = "bg-red-100 text-red-700 border border-red-200";

                return `
                <tr class="border-b border-gray-50 hover:bg-blue-50/20 transition">
                    <td class="p-5 text-[11px] font-bold text-gray-500">${dateStr}</td>
                    <td class="p-5">
                        <div class="font-bold text-gray-800">${auteur}</div>
                        <div class="text-[9px] text-gray-400 uppercase font-black tracking-widest mt-1">${role}</div>
                    </td>
                    <td class="p-5"><span class="px-2 py-1 rounded-xl text-[10px] font-black uppercase shadow-sm ${badge}">${typeAction}</span></td>
                    <td class="p-5">
                        <div class="font-bold text-[#1A4E8A] text-xs">${categorie}</div>
                        <div class="font-mono text-[10px] text-orange-600 font-bold mt-1">${cible}</div>
                    </td>
                    <td class="p-5 text-xs text-gray-600 leading-relaxed">${details}</td>
                </tr>`;
            }).join('');
        }

        function resetFilters() {
            document.getElementById('fSearch').value = "";
            document.getElementById('fAuteur').value = "";
            document.getElementById('fCategorie').value = ""; // NOUVEAU
            document.getElementById('fCible').value = "";
            document.getElementById('fAction').value = "";
            document.getElementById('fDate').value = "";
            applyFilters();
        }

        function exportCSV() {
            if (filteredLogs.length === 0) return alert("Rien à exporter !");
            let csv = "Date;Auteur;Role;Action;Categorie;Cible;Details\n";
            filteredLogs.forEach(log => {
                const dateVal = getSafeValue(log, ['date']);
                const dateStr = dateVal ? new Date(dateVal).toLocaleString('fr-FR') : '';
                const details = String(getSafeValue(log, ['détail', 'detail']) || "").replace(/;/g, ',').replace(/\n/g, ' ');
                csv += `"${dateStr}";"${getSafeValue(log, ['auteur'])}";"${getSafeValue(log, ['role'])}";"${getSafeValue(log, ['type'])}";"${getSafeValue(log, ['catégorie'])}";"${getSafeValue(log, ['cible'])}";"${details}"\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Audit_HECG_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
    </script>
</body>
</html>
